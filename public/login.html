<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Generator — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d2a42, #1F5F99, #2B81C5);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background orbs */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #2B81C5, transparent);
      top: -150px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #9CBFDE, transparent);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .login-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 50px 44px;
      width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }

    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .logo-icon svg { width: 42px; height: 42px; }

    .brand-name {
      font-size: 22px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      text-align: center;
    }

    .brand-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    h2 {
      font-size: 26px;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 14px;
      color: white;
      outline: none;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    input::placeholder { color: rgba(255,255,255,0.35); }

    input:focus {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #1F5F99, #2B81C5);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(43,129,197,0.5);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .hint {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <polygon points="44,8 18,42 36,42 26,72 62,32 44,32 56,8" fill="white"/>
      </svg>
    </div>
    <div class="brand-name">INVOICE GEN</div>
    <div class="brand-sub">Professional Invoicing</div>
  </div>

  <h2>Welcome Back</h2>
  <p class="subtitle">Sign in to manage your invoices</p>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>

  <p class="hint">Default: admin / admin123</p>
</div>

<script>
  // If already logged in, redirect to app
  if (localStorage.getItem('invoice_token')) {
    window.location.href = '/';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      });

      const data = await res.json();

      if (!res.ok) {
        err.textContent = data.error || 'Login failed';
        err.style.display = 'block';
      } else {
        localStorage.setItem('invoice_token', data.token);
        localStorage.setItem('invoice_user', JSON.stringify(data.user));
        window.location.href = '/';
      }
    } catch (ex) {
      err.textContent = 'Connection error. Is the server running?';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
